name: E2E Tests

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

env:
  NODE_VERSION: 22

jobs:
  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@e3a8f54e503c635126f2f253c84cea5f737d6714
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp exec playwright install --with-deps chromium
      - run: vp run test:e2e
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_CONVEX_SITE_URL: ${{ secrets.VITE_CONVEX_SITE_URL }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_PLAYER_EMAIL: ${{ secrets.E2E_PLAYER_EMAIL }}
          E2E_PLAYER_PASSWORD: ${{ secrets.E2E_PLAYER_PASSWORD }}
          TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
