name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile

  check:
    name: Check (lint + format + typecheck)
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp check
      - run: vp run lint:convex # TODO: remove this once plugins exist for oxlint

  fallow:
    name: Fallow
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - name: Run Fallow
        continue-on-error: true
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            vp run fallow audit --base origin/main --format annotations --format json > fallow-report.json
          else
            vp run fallow --format json > fallow-report.json
          fi
      - name: Generate badge JSON
        id: fallow-score
        if: github.ref == 'refs/heads/main'
        run: |
          SCORE=$(vp run fallow health --score)
          if [ "$SCORE" -ge 75 ]; then COLOR="brightgreen";
          elif [ "$SCORE" -ge 50 ]; then COLOR="yellow";
          else COLOR="red"; fi
          echo '{"schemaVersion":1,"label":"fallow health","message":"'"$SCORE"'/100","color":"'"$COLOR"'"}' > fallow-badge.json
      - name: Upload badge
        if: github.ref == 'refs/heads/main' && steps.fallow-score.conclusion == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: fallow-badge
          path: fallow-badge.json

  react-compiler:
    name: React Compiler Health
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - run: npx react-compiler-healthcheck --src "src/**/*.{ts,tsx}"

  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - name: Run React Doctor (PR)
        if: github.event_name == 'pull_request'
        run: npx -y react-doctor@latest . --verbose --fail-on error --diff=${{ github.event.pull_request.base.ref }}
      - name: Run React Doctor (main)
        id: doctor
        if: github.ref == 'refs/heads/main'
        run: |
          SCORE=$(npx -y react-doctor@latest . --verbose --fail-on error --score)
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
      - name: Generate badge JSON
        if: github.ref == 'refs/heads/main' && steps.doctor.outputs.score != ''
        run: |
          SCORE=${{ steps.doctor.outputs.score }}
          if [ "$SCORE" -ge 75 ]; then COLOR="brightgreen";
          elif [ "$SCORE" -ge 50 ]; then COLOR="yellow";
          else COLOR="red"; fi
          echo '{"schemaVersion":1,"label":"react doctor","message":"'"$SCORE"'/100","color":"'"$COLOR"'"}' > react-doctor-badge.json
      - name: Upload badge
        if: github.ref == 'refs/heads/main' && steps.doctor.outputs.score != ''
        uses: actions/upload-artifact@v4
        with:
          name: react-doctor-badge
          path: react-doctor-badge.json

  unit-tests-badge:
    name: Unit Tests Badge
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && always()
    needs: [frontend-test, backend-test]
    steps:
      - name: Generate badge JSON
        run: |
          if [ "${{ needs.frontend-test.result }}" = "success" ] && [ "${{ needs.backend-test.result }}" = "success" ]; then
            MSG="passing"; COLOR="brightgreen"
          else
            MSG="failing"; COLOR="red"
          fi
          echo '{"schemaVersion":1,"label":"unit tests","message":"'"$MSG"'","color":"'"$COLOR"'"}' > unit-tests-badge.json
      - uses: actions/upload-artifact@v4
        with:
          name: unit-tests-badge
          path: unit-tests-badge.json

  publish-badges:
    name: Publish Badges
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && always()
    needs: [fallow, react-doctor, unit-tests-badge]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: badges
          merge-multiple: true
      - name: Push to badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan badges-tmp
          git rm -rf . > /dev/null 2>&1 || true
          cp badges/* . 2>/dev/null || true
          git add *.json 2>/dev/null || true
          git commit -m "Update badges" --allow-empty
          git push origin badges-tmp:badges --force

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp test run --config vitest.config.ts --reporter=verbose

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp test run --config convex/vitest.config.mts --reporter=verbose

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp build
