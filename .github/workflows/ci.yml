name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile

  check:
    name: Check (lint + format + typecheck)
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp check
      - run: vp run lint:convex # TODO: remove this once plugins exist for oxlint

  fallow:
    name: Fallow
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - name: Run Fallow (full scan on main, diff on PRs)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            vp run fallow audit --base origin/main
          else
            vp run fallow audit
          fi

  react-compiler:
    name: React Compiler Health
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - run: npx react-compiler-healthcheck --src "src/**/*.{ts,tsx}"

  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - name: Run React Doctor (full scan on main, diff on PRs)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx -y react-doctor@latest . --verbose --fail-on error --diff ${{ github.event.pull_request.base.sha }}
          else
            npx -y react-doctor@latest . --verbose --fail-on error
          fi

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp test run --config vitest.config.ts --reporter=verbose --reporter=junit --outputFile=test-results/frontend.junit.xml --coverage
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: frontend
      - uses: codecov/test-results-action@v1
        if: ${{ !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: frontend
          file: test-results/frontend.junit.xml

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp test run --config convex/vitest.config.mts --reporter=verbose --reporter=junit --outputFile=test-results/backend.junit.xml --coverage
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: backend
      - uses: codecov/test-results-action@v1
        if: ${{ !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: backend
          file: test-results/backend.junit.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check]
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp build
