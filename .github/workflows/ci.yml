name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  VITE_SITE_URL: 'http://localhost:3000'

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@e3a8f54e503c635126f2f253c84cea5f737d6714
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile

  check:
    name: Check (lint + format + typecheck)
    runs-on: ubuntu-latest
    needs: [setup]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@e3a8f54e503c635126f2f253c84cea5f737d6714
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp run check:editor-sdk
      - run: vp check
      - run: vp run lint:convex
      - run: vp run check:no-reexports
      - run: vp run check:import-boundaries

  fallow:
    if: github.event_name == 'pull_request'
    name: Fallow
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: fallow-rs/fallow@9df2d1f754c482c458dadd5f113320f785c3ee44
        with:
          annotations: true
          fail-on-issues: false
          format: sarif

  react-compiler:
    name: React Compiler Health
    runs-on: ubuntu-latest
    needs: [setup]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@e3a8f54e503c635126f2f253c84cea5f737d6714
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp dlx react-compiler-healthcheck --src "src/**/*.{ts,tsx}" --src "packages/editor/src/**/*.{ts,tsx}"

  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    needs: [setup]
    permissions:
      contents: read
    env:
      DIFF_BASE: ${{ github.event.pull_request.base.ref }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@e3a8f54e503c635126f2f253c84cea5f737d6714
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - name: Run React Doctor (PR)
        if: github.event_name == 'pull_request'
        run: vp dlx react-doctor@latest . --verbose --fail-on error --diff="origin/$DIFF_BASE"
      - name: Run React Doctor (main)
        if: github.ref == 'refs/heads/main'
        run: vp dlx react-doctor@latest . --verbose --fail-on error

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [check]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@e3a8f54e503c635126f2f253c84cea5f737d6714
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp test run --config vitest.config.ts --reporter=verbose

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [check]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@e3a8f54e503c635126f2f253c84cea5f737d6714
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp test run --config convex/vitest.config.mts --reporter=verbose

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@e3a8f54e503c635126f2f253c84cea5f737d6714
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp build
