name: CodeQL

on:
  pull_request:
    branches: [main, dev]

env:
  NODE_VERSION: 22

jobs:
  analyze:
    name: CodeQL
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@e3a8f54e503c635126f2f253c84cea5f737d6714
        with:
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@fb84f6228fd846d3c392887f22b18ce2d9139495
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@fb84f6228fd846d3c392887f22b18ce2d9139495
