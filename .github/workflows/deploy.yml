name: Prepare Production Candidate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to release
        required: true
        default: main
      release_notes:
        description: Short note to attach to the Cloudflare Worker version
        required: false

concurrency:
  group: prepare-production-candidate
  cancel-in-progress: false

env:
  NODE_VERSION: 22
  CANDIDATE_DOMAIN: candidate.wizardarchive.com
  CANDIDATE_SITE_URL: https://candidate.wizardarchive.com

jobs:
  prepare-production-candidate:
    name: Prepare Production Candidate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - name: Prepare candidate
        run: |
          set -euo pipefail
          umask 077
          worker_env_file="$(mktemp "${RUNNER_TEMP}/worker-env.XXXXXX")"
          candidate_worker_env_file="$(mktemp "${RUNNER_TEMP}/candidate-worker-env.XXXXXX")"
          convex_env_file="$(mktemp "${RUNNER_TEMP}/convex-env.XXXXXX")"
          trap 'rm -f "$worker_env_file" "$candidate_worker_env_file" "$convex_env_file"' EXIT

          bash scripts/write-worker-env.sh "$worker_env_file"
          VITE_SITE_URL="$CANDIDATE_SITE_URL" bash scripts/write-worker-env.sh "$candidate_worker_env_file"
          bash scripts/write-convex-env.sh "$convex_env_file"

          release_sha="$(git rev-parse HEAD)"
          release_message="$RELEASE_NOTES"
          if [[ -z "$release_message" ]]; then
            release_message="Production candidate ${release_sha}"
          fi

          vp check
          vp run lint:convex
          vp build --mode production

          vp exec convex env set --from-file "$convex_env_file"
          vp exec convex deploy

          vp exec wrangler versions upload \
            --config dist/server/wrangler.json \
            --secrets-file "$worker_env_file" \
            --tag "$release_sha" \
            --message "$release_message"

          vp exec wrangler deploy \
            --config dist/server/wrangler.json \
            --secrets-file "$candidate_worker_env_file" \
            --name wizard-archive-candidate \
            --domain "$CANDIDATE_DOMAIN"
        env:
          CONVEX_DEPLOY_KEY: '${{ secrets.CONVEX_DEPLOY_KEY }}'
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_CONVEX_SITE_URL: ${{ secrets.VITE_CONVEX_SITE_URL }}
          VITE_SITE_URL: https://wizardarchive.com
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          SITE_URL: https://wizardarchive.com
          ADDITIONAL_TRUSTED_ORIGINS: ${{ env.CANDIDATE_SITE_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
