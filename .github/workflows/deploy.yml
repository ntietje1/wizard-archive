name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  NODE_VERSION: 22

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - name: Deploy Convex
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: '${{ secrets.CONVEX_DEPLOY_KEY }}'
      - name: Deploy Cloudflare Workers
        run: |
          cat <<EOF > .deploy-secrets.env
          VITE_CONVEX_URL=${VITE_CONVEX_URL}
          VITE_CONVEX_SITE_URL=${VITE_CONVEX_SITE_URL}
          VITE_SITE_URL=${VITE_SITE_URL}
          EOF

          vp build --mode production
          npx wrangler deploy --keep-vars --secrets-file .deploy-secrets.env
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_CONVEX_SITE_URL: ${{ secrets.VITE_CONVEX_SITE_URL }}
          VITE_SITE_URL: https://wizardarchive.com
