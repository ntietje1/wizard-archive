name: Prepare Production Candidate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to release
        required: true
        default: main
      release_notes:
        description: Short note to attach to the Cloudflare Worker version
        required: false
      deploy_convex:
        description: Deploy production Convex backend before uploading the Worker candidate
        required: true
        type: boolean
        default: false

concurrency:
  group: prepare-production-candidate
  cancel-in-progress: false

env:
  NODE_VERSION: 22

jobs:
  prepare-production-candidate:
    name: Prepare Production Candidate
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.ref }}
      - uses: voidzero-dev/setup-vp@e3a8f54e503c635126f2f253c84cea5f737d6714
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install --frozen-lockfile
      - name: Prepare candidate
        run: |
          set -euo pipefail
          umask 077
          worker_env_file="$(mktemp "${RUNNER_TEMP}/worker-env.XXXXXX")"
          candidate_worker_env_file="$(mktemp "${RUNNER_TEMP}/candidate-worker-env.XXXXXX")"
          convex_env_file="$(mktemp "${RUNNER_TEMP}/convex-env.XXXXXX")"
          trap 'rm -f "$worker_env_file" "$candidate_worker_env_file" "$convex_env_file"' EXIT

          for var_name in \
            CLOUDFLARE_API_TOKEN \
            VITE_CONVEX_URL \
            VITE_CONVEX_SITE_URL \
            VITE_SITE_URL \
            BETTER_AUTH_SECRET \
            GOOGLE_CLIENT_ID \
            GOOGLE_CLIENT_SECRET \
            RESEND_API_KEY; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Missing required environment variable: ${var_name}" >&2
              exit 1
            fi
          done

          if [[ "${DEPLOY_CONVEX}" == "true" && -z "${CONVEX_DEPLOY_KEY:-}" ]]; then
            echo "Missing required environment variable: CONVEX_DEPLOY_KEY" >&2
            exit 1
          fi

          site_host="${VITE_SITE_URL#*://}"
          site_host="${site_host%%/*}"
          if [[ -z "$site_host" ]]; then
            echo "Unable to derive site host from VITE_SITE_URL" >&2
            exit 1
          fi

          if [[ "$site_host" == www.* ]]; then
            site_apex_host="${site_host#www.}"
            site_www_host="$site_host"
          else
            site_apex_host="$site_host"
            site_www_host="www.${site_host}"
          fi

          candidate_host="candidate.${site_apex_host}"
          candidate_site_url="https://${candidate_host}"
          convex_site_host="${VITE_CONVEX_SITE_URL#*://}"
          convex_site_host="${convex_site_host%%/*}"
          if [[ -z "$convex_site_host" ]]; then
            echo "Unable to derive Convex site host from VITE_CONVEX_SITE_URL" >&2
            exit 1
          fi

          export BETTER_AUTH_ALLOWED_HOSTS="${site_apex_host},${site_www_host},${candidate_host},${convex_site_host}"

          bash scripts/write-worker-env.sh "$worker_env_file"
          VITE_SITE_URL="$candidate_site_url" bash scripts/write-worker-env.sh "$candidate_worker_env_file"
          if [[ "${DEPLOY_CONVEX}" == "true" ]]; then
            bash scripts/write-convex-env.sh "$convex_env_file"
          fi

          release_sha="$(git rev-parse HEAD)"
          release_message="$RELEASE_NOTES"
          if [[ -z "$release_message" ]]; then
            release_message="Production candidate ${release_sha}"
          fi

          vp run check:editor-sdk
          vp check
          vp run lint:convex
          vp run check:no-reexports
          vp run check:import-boundaries
          vp test run --config vitest.config.ts --reporter=verbose
          vp test run --config convex/vitest.config.mts --reporter=verbose
          vp run build:production

          if [[ "${DEPLOY_CONVEX}" == "true" ]]; then
            vp exec convex env set --from-file "$convex_env_file" --force
            vp exec convex deploy
          else
            echo "Skipping production Convex deploy because deploy_convex=false"
          fi

          vp exec wrangler versions upload \
            --config dist/server/wrangler.json \
            --secrets-file "$worker_env_file" \
            --tag "$release_sha" \
            --message "$release_message"

          VITE_SITE_URL="$candidate_site_url" vp build --mode production

          vp exec wrangler deploy \
            --config dist/server/wrangler.json \
            --secrets-file "$candidate_worker_env_file" \
            --name wizard-archive-candidate \
            --domain "$candidate_host"
        env:
          CONVEX_DEPLOY_KEY: '${{ secrets.CONVEX_DEPLOY_KEY }}'
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DEPLOY_CONVEX: ${{ inputs.deploy_convex }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_CONVEX_SITE_URL: ${{ secrets.VITE_CONVEX_SITE_URL }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
